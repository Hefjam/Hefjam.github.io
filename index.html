<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hefjam</title>
  <meta name="description" content="Hefjam — projects and links." />
  <style>
    :root {
      --bg: #0f1115;
      --card: #171a21;
      --text: #e8eaed;
      --muted: #9aa0a6;
      --accent: #e4572e;
      --border: #262a33;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
    }
    main { width: 100%; max-width: 520px; }
    h1 { font-size: 1.9rem; margin: 0 0 4px; }
    p.lead { color: var(--muted); margin: 0 0 28px; }
    ul.links { list-style: none; padding: 0; margin: 0; display: grid; gap: 12px; }
    a.link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      text-decoration: none;
      transition: border-color .15s ease, transform .05s ease;
    }
    a.link:hover { border-color: var(--accent); }
    a.link:active { transform: translateY(1px); }
    a.link .title { font-weight: 600; }
    a.link .sub { display: block; color: var(--muted); font-size: .85rem; font-weight: 400; margin-top: 2px; }
    a.link .arrow { color: var(--muted); }
    .primary { border-color: var(--accent); }
    footer { margin-top: 28px; color: var(--muted); font-size: .8rem; }
    footer a { color: var(--muted); }
  </style>
</head>
<body>
  <main>
    <h1>Hefjam</h1>
    <p class="lead">Projects and links.</p>

    <ul class="links">
      <!--
        TAPROOM ORDERING APP
        ====================
        The ordering app now lives in its own repo (hefjam/Taproom-Pizza).
        Set the href below to the app's LIVE customer URL before going live,
        and re-point your table QR codes to the same URL.
        Default below is the GitHub Pages project URL for that repo; if the
        app is served via Cloudflare on a custom domain, use that instead.
      -->
      <li>
        <a class="link primary" href="https://hefjam.github.io/Taproom-Pizza/">
          <span>
            <span class="title">The Taproom · Pizza</span>
            <span class="sub">Order at your table</span>
          </span>
          <span class="arrow">&rarr;</span>
        </a>
      </li>
      <li>
        <a class="link" href="taproom-kitchen.html">
          <span>
            <span class="title">Kitchen display</span>
            <span class="sub">Live orders for the kitchen</span>
          </span>
          <span class="arrow">&rarr;</span>
        </a>
      </li>
      <li>
        <a class="link" href="QR Codes.html">
          <span>
            <span class="title">Table QR codes</span>
            <span class="sub">Printable codes for each table</span>
          </span>
          <span class="arrow">&rarr;</span>
        </a>
      </li>
      <li>
        <a class="link" href="menu-development-research.html">
          <span>
            <span class="title">Menu inspiration board</span>
            <span class="sub">Menu development research</span>
          </span>
          <span class="arrow">&rarr;</span>
        </a>
      </li>
    </ul>

    <footer>
      <a href="privacy.html">Privacy policy</a>
    </footer>
  </main>
</body>
</html>
