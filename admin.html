<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin · The Taproom Pizza</title>
<style>
*,*::before,*::after{box-sizing:border-box}
*{margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1816;color:#e8dfca;min-height:100vh}
#login,#app{max-width:480px;margin:0 auto;padding:24px 16px}
h1{font-size:20px;font-weight:700;margin-bottom:4px;color:#fff}
.sub{font-size:12px;color:#a89a85;margin-bottom:28px}
label{display:block;font-size:12px;font-weight:600;color:#a89a85;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
input[type=password],input[type=text],input[type=number],textarea{width:100%;padding:12px 14px;background:#2a2420;border:1.5px solid #3d3028;border-radius:8px;color:#e8dfca;font-size:15px;font-family:inherit;transition:border-color .15s}
input:focus,textarea:focus{outline:none;border-color:#e87545}
textarea{resize:vertical;min-height:60px}
.btn{display:block;width:100%;padding:14px;background:#e87545;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s}
.btn:hover{opacity:.88}
.btn:disabled{opacity:.4;cursor:default}
.btn-outline{background:transparent;border:1.5px solid #e87545;color:#e87545}
.btn-sm{padding:7px 14px;font-size:13px;width:auto}
.btn-danger{background:#b33;color:#fff}
.err{color:#f87171;font-size:13px;margin-top:8px}
.ok{color:#6ee7b7;font-size:13px;margin-top:8px}
.card{background:#231f1c;border:1px solid #3d3028;border-radius:12px;padding:16px;margin-bottom:12px}
.card-hd{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
.card-name{font-weight:700;font-size:15px;color:#fff}
.card-type{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#a89a85;border:1px solid #3d3028;padding:2px 6px;border-radius:4px}
.row{display:flex;gap:10px;margin-bottom:10px}
.row>*{flex:1}
.row label{margin-top:0}
.toggle-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 0}
.toggle-row+.toggle-row{border-top:1px solid #3d3028}
.toggle-label{font-size:14px;font-weight:600;color:#e8dfca}
.toggle-sub{font-size:12px;color:#a89a85;margin-top:2px}
/* toggle switch */
.sw{position:relative;display:inline-block;width:44px;height:26px;flex-shrink:0}
.sw input{opacity:0;width:0;height:0}
.sl{position:absolute;inset:0;background:#3d3028;border-radius:999px;cursor:pointer;transition:background .2s}
.sl::before{content:'';position:absolute;width:20px;height:20px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .2s}
.sw input:checked+.sl{background:#e87545}
.sw input:checked+.sl::before{transform:translateX(18px)}
section{margin-top:28px}
section h2{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#a89a85;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #3d3028}
.pause-msg{margin-top:10px;display:none}
.pause-msg.show{display:block}
#save-bar{position:sticky;bottom:0;background:#1a1816;border-top:1px solid #3d3028;padding:14px 16px;margin:0 -16px;display:flex;gap:10px;align-items:center}
#save-status{font-size:12px;flex:1}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <h1>The Taproom · Admin</h1>
  <p class="sub">Pizza menu management</p>
  <label for="pin">Admin PIN</label>
  <input type="password" id="pin" inputmode="numeric" autocomplete="current-password" placeholder="••••" maxlength="10">
  <div id="login-err" class="err" style="display:none"></div>
  <br>
  <button class="btn" id="login-btn" onclick="doLogin()">Sign in</button>
</div>

<!-- MAIN APP (hidden until logged in) -->
<div id="app" style="display:none">
  <h1>Menu editor</h1>
  <p class="sub" id="last-saved"></p>

  <!-- GLOBAL CONTROLS -->
  <section>
    <h2>Ordering</h2>
    <div class="card">
      <div class="toggle-row">
        <div>
          <div class="toggle-label">Ordering enabled</div>
          <div class="toggle-sub">Turn off to pause all new orders</div>
        </div>
        <label class="sw"><input type="checkbox" id="ordering-enabled" onchange="togglePauseMsg()"><span class="sl"></span></label>
      </div>
      <div class="pause-msg" id="pause-msg-row">
        <label for="pause-msg" style="margin-top:10px">Message shown to customers</label>
        <textarea id="pause-msg" rows="2" placeholder="Sorry — we've sold out of dough for tonight!"></textarea>
      </div>
    </div>
  </section>

  <!-- PIZZA ITEMS -->
  <section>
    <h2>Pizzas &amp; starters</h2>
    <div id="pizza-list"></div>
    <button class="btn btn-outline" onclick="addItem('pizza')" style="margin-top:4px">+ Add item</button>
  </section>

  <!-- CONDIMENTS -->
  <section>
    <h2>Condiments</h2>
    <div id="condiment-list"></div>
    <button class="btn btn-outline" onclick="addItem('condiment')" style="margin-top:4px">+ Add condiment</button>
  </section>

  <div style="height:80px"></div>
  <div id="save-bar">
    <div id="save-status"></div>
    <button class="btn btn-sm btn-outline" onclick="doLogout()">Sign out</button>
    <button class="btn btn-sm" id="save-btn" onclick="doSave()">Save changes</button>
  </div>
</div>

<script>
let menuData = null;

// ─── LOGIN ────────────────────────────────────────────────────────────────────
document.getElementById('pin').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

async function doLogin() {
  const pin = document.getElementById('pin').value.trim();
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-err');
  err.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Signing in…';
  try {
    const r = await fetch('/api/admin/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ pin }), credentials: 'same-origin' });
    const d = await r.json();
    if (!r.ok) { err.textContent = d.error || 'Failed'; err.style.display = 'block'; return; }
    document.getElementById('login').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    await loadMenu();
  } catch (e) {
    err.textContent = 'Network error — check your connection.'; err.style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = 'Sign in';
  }
}

function doLogout() {
  document.cookie = 'admin_session=; Max-Age=0; Path=/';
  document.getElementById('login').style.display = 'block';
  document.getElementById('app').style.display = 'none';
  document.getElementById('pin').value = '';
  menuData = null;
}

// ─── LOAD MENU ────────────────────────────────────────────────────────────────
async function loadMenu() {
  const r = await fetch('/api/admin/menu', { credentials: 'same-origin' });
  if (r.status === 401) { doLogout(); return; }
  menuData = await r.json();
  renderMenu();
}

function renderMenu() {
  document.getElementById('ordering-enabled').checked = menuData.orderingEnabled;
  document.getElementById('pause-msg').value = menuData.pausedMessage || '';
  togglePauseMsg();
  if (menuData.updatedAt) {
    const d = new Date(menuData.updatedAt);
    document.getElementById('last-saved').textContent = 'Last saved: ' + d.toLocaleString('en-GB');
  }

  const pizzas = (menuData.items || []).filter(i => i.type !== 'condiment');
  const conds  = (menuData.items || []).filter(i => i.type === 'condiment');

  document.getElementById('pizza-list').innerHTML = pizzas.map((item, i) => itemCard(item, 'pizza', i)).join('');
  document.getElementById('condiment-list').innerHTML = conds.map((item, i) => itemCard(item, 'condiment', i)).join('');
}

function togglePauseMsg() {
  const on = document.getElementById('ordering-enabled').checked;
  document.getElementById('pause-msg-row').classList.toggle('show', !on);
}

// ─── ITEM CARD ────────────────────────────────────────────────────────────────
let _nextId = 1;
function itemCard(item, type, idx) {
  const uid = item.id || ('new-' + _nextId++);
  const tagsStr = (item.tags || []).join(',');
  return `
  <div class="card" data-item-id="${escHtml(uid)}">
    <div class="card-hd">
      <div>
        <span class="card-name">${escHtml(item.name || 'New item')}</span>
        <span class="card-type">${type}</span>
      </div>
      <div class="toggle-row" style="padding:0;border:none;gap:8px">
        <label class="toggle-sub" style="margin:0">Available</label>
        <label class="sw" style="width:36px;height:22px">
          <input type="checkbox" data-field="available" ${item.available !== false ? 'checked' : ''} onchange="markDirty()">
          <span class="sl" style="border-radius:999px"></span>
        </label>
      </div>
    </div>
    <div class="row">
      <div><label>Name</label><input type="text" data-field="name" value="${escHtml(item.name || '')}" oninput="markDirty();this.closest('.card').querySelector('.card-name').textContent=this.value"></div>
      <div><label>Price £</label><input type="number" data-field="price" value="${item.price ?? ''}" step="0.01" min="0" oninput="markDirty()"></div>
    </div>
    ${type === 'pizza' ? `
    <div style="margin-bottom:10px">
      <label>Description</label>
      <textarea data-field="desc" oninput="markDirty()">${escHtml(item.desc || '')}</textarea>
    </div>
    <div class="row">
      <div><label>Tags (v,ve,🌶)</label><input type="text" data-field="tags" value="${escHtml(tagsStr)}" oninput="markDirty()"></div>
      <div><label>EposNow ID</label><input type="number" data-field="eposId" value="${item.eposId || ''}" oninput="markDirty()"></div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:4px">
      <label class="toggle-sub" style="margin:0">Mark as special</label>
      <label class="sw" style="width:36px;height:22px">
        <input type="checkbox" data-field="special" ${item.special ? 'checked' : ''} onchange="markDirty()">
        <span class="sl"></span>
      </label>
    </div>` : `
    <div><label>EposNow ID</label><input type="number" data-field="eposId" value="${item.eposId || ''}" oninput="markDirty()"></div>
    `}
    <div style="text-align:right;margin-top:10px">
      <button class="btn btn-sm btn-danger btn-outline" style="border-color:#b33;color:#f87171;background:transparent" onclick="removeItem(this,'${escHtml(uid)}')">Remove</button>
    </div>
  </div>`;
}

function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── COLLECT STATE FROM DOM ───────────────────────────────────────────────────
function collectMenu() {
  const items = [];
  document.querySelectorAll('#pizza-list .card, #condiment-list .card').forEach(card => {
    const g = f => card.querySelector(`[data-field="${f}"]`);
    const type = card.closest('#pizza-list') ? 'pizza' : 'condiment';
    const rawId = card.dataset.itemId || '';
    const existingItem = menuData.items.find(i => i.id === rawId);
    const id = existingItem ? existingItem.id : rawId;
    const tagsRaw = g('tags') ? g('tags').value.trim() : '';
    const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];
    items.push({
      id,
      type,
      name: g('name').value.trim(),
      price: parseFloat(g('price').value) || 0,
      desc: g('desc') ? g('desc').value.trim() : '',
      tags,
      eposId: parseInt(g('eposId').value) || null,
      available: g('available').checked,
      special: g('special') ? g('special').checked : false,
    });
  });
  return {
    ...menuData,
    orderingEnabled: document.getElementById('ordering-enabled').checked,
    pausedMessage: document.getElementById('pause-msg').value.trim(),
    items,
  };
}

// ─── ADD / REMOVE ITEMS ───────────────────────────────────────────────────────
function addItem(type) {
  const uid = 'new-' + Date.now();
  const card = document.createElement('div');
  card.innerHTML = itemCard({ id: uid, name: '', price: '', desc: '', tags: [], available: true, special: false }, type, -1);
  document.getElementById(type === 'pizza' ? 'pizza-list' : 'condiment-list').appendChild(card.firstElementChild);
  markDirty();
}

function removeItem(btn, uid) {
  if (!confirm('Remove this item from the menu?')) return;
  btn.closest('.card').remove();
  markDirty();
}

// ─── DIRTY / SAVE ─────────────────────────────────────────────────────────────
let dirty = false;
function markDirty() { dirty = true; document.getElementById('save-btn').textContent = 'Save changes *'; }

async function doSave() {
  const btn = document.getElementById('save-btn');
  const status = document.getElementById('save-status');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Saving…';
  status.textContent = '';
  try {
    const payload = collectMenu();
    const r = await fetch('/api/admin/menu', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload), credentials: 'same-origin' });
    const d = await r.json();
    if (!r.ok) { status.innerHTML = '<span style="color:#f87171">' + escHtml(d.error || 'Save failed') + '</span>'; return; }
    menuData = { ...payload, version: d.version };
    dirty = false;
    btn.textContent = 'Save changes';
    status.innerHTML = '<span style="color:#6ee7b7">Saved ✓</span>';
    document.getElementById('last-saved').textContent = 'Last saved: ' + new Date().toLocaleString('en-GB');
    setTimeout(() => { if (status.textContent.includes('✓')) status.textContent = ''; }, 4000);
  } catch (e) {
    status.innerHTML = '<span style="color:#f87171">Network error</span>';
  } finally {
    btn.disabled = false;
    if (dirty) btn.textContent = 'Save changes *';
  }
}

window.addEventListener('beforeunload', e => { if (dirty) { e.preventDefault(); e.returnValue = ''; } });

// Auto-login if session cookie already valid
(async () => {
  try {
    const r = await fetch('/api/admin/menu', { credentials: 'same-origin' });
    if (r.ok) {
      document.getElementById('login').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      menuData = await r.json();
      renderMenu();
    }
  } catch {}
})();
</script>
</body>
</html>
